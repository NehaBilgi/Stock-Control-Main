kind = "web"
previewPath = "/"
title = "Inventory Management System"
version = "1.0.0"
id = "artifacts/inventory-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24449

[services.development]
run = "pnpm --filter @workspace/inventory-app run dev"

[services.production]
serve = "static"
publicDir = "artifacts/inventory-app/dist/public"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/inventory-app", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
PORT = "24449"
BASE_PATH = "/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24449"
BASE_PATH = "/"
